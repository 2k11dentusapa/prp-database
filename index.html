<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PRP Database</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #fff;
}

h1 {
    text-align: center;
}

.container {
    width: 600px;
    margin: auto;
    text-align: center;
}

a {
    display: block;
    margin: 10px;
    padding: 10px;
    border: 1px solid #999;
    text-decoration: none;
    color: black;
}

a:hover {
    background: #f0f0f0;
}

#searchBox {
    width: 300px;
    padding: 6px;
    margin-top: 20px;
}
</style>
</head>
<body>
<h1>PRP Database</h1>
<div class="container">
    <h3>📂 Dataset</h3>
    <a href="1-10000.html">1 - 10,000</a>
    <a href="10001-25000.html">10,001 - 25,000</a>
    <a href="25001-50000.html">25,001 - 50,000</a>
    <a href="50001-100000.html">50,001 - 100,000</a>
    <a href="100001-inf.html">100,001+</a>
    <h3>Quick Search</h3>
    <input type="text" id="searchBox" placeholder="Search and jump...">
</div>
<script>
document.getElementById("searchBox").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        const val = this.value.toLowerCase();
        window.location.href = "1-10000.html?search=" + encodeURIComponent(val);
    }
});
</script>
</body>
</html>
